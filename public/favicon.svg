<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="8" fill="#09090b"/>

  <!-- Outer ring of O -->
  <circle cx="16" cy="16" r="10" stroke="#6366f1" stroke-width="3.5" fill="none"/>

  <!-- Small center node dot — signals automation/AI -->
  <circle cx="16" cy="16" r="2.5" fill="#6366f1"/>

  <!-- Two short connector lines (circuit node style) -->
  <line x1="16" y1="13.5" x2="16" y2="7" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="18.5" y1="16" x2="25" y2="16" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
